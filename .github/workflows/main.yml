name: Main CI

on:
  push:
    branches:
      - master
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+
  pull_request:
    branches:
      - master

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'
      - run: yarn install --frozen-lockfile --prefer-offline
      - run: yarn lint
  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
      CSS_VALIDATOR_URL: 'http://localhost:8081/css-validator'
      PUPPETEER_EXEC_PATH: '/usr/bin/google-chrome'
    strategy:
      matrix:
        node-version: [lts/*, current]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      - run: yarn install --frozen-lockfile --prefer-offline
      - run: docker build -t css-builder ./testing-validator-image
      - run: docker run -d -p 8081:8080 -i css-builder
      - name: Wait for Tomcat to respond
        run: |
          echo "Waiting for web server..."
          timeout 30s bash -c '
            until curl -sI http://localhost:8081 | grep -q "200\|404\|403"; do
              sleep 1
            done
          '
          echo "Server is responding!"
      - run: yarn test
      - name: Codecov
        uses: codecov/codecov-action@v3
  verify-website:
    name: Verify website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'
      - run: yarn dev
      - run: yarn --cwd ./website type-check
      - run: yarn --cwd ./website build
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - verify-website
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'
      - run: yarn install --frozen-lockfile --prefer-offline
      - run: yarn compile
      - run: |
          if [[ "$GITHUB_REF" =~ -alpha ]]; then
            npm publish --tag alpha
          elif [[ "$GITHUB_REF" =~ -beta ]]; then
            npm publish --tag beta
          else
            npm publish
          fi
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - verify-website
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'
      - run: yarn dev
      - run: yarn --cwd ./website build
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.0.0
        with:
          branch: gh-pages
          folder: website/build
